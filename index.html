<!DOCTYPE html>
<html>
<head>
	<title>Shared Text Website with Message Saving</title>
</head>
<body>
	<h1>Shared Text Website with Message Saving</h1>
	<form>
		<label for="text-input">Type your message:</label>
		<input type="text" id="text-input" name="text-input">
		<button type="button" onclick="postMessage()">Post Message</button>
	</form>
	<hr>
	<div id="messages">
		<!-- Existing messages will be added here -->
	</div>
	<script>
		function postMessage() {
			// Get the text from the input field
			var messageText = document.getElementById("text-input").value;
			
			// Create a new message element with the text
			var messageElement = document.createElement("p");
			messageElement.innerText = messageText;
			
			// Add the message element to the messages container
			var messagesContainer = document.getElementById("messages");
			messagesContainer.appendChild(messageElement);
			
			// Save the message to a file on GitHub
			var messageData = { "message": messageText };
			var messageJson = JSON.stringify(messageData);
			var xhr = new XMLHttpRequest();
			xhr.open("POST", "https://api.github.com/repos/rutra8002/rutra8002.github.io/contents/messages.json");
			xhr.setRequestHeader("Authorization", "Bearer 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");
			xhr.setRequestHeader("Content-Type", "application/json");
			xhr.send(messageJson);
		}
	</script>
</body>
</html>
