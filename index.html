<!DOCTYPE html>
<html>
<head>
    <title>Public Message Board</title>
</head>
<body>
    <h1>Public Message Board</h1>
    <form>
        <input type="text" id="message" placeholder="Enter your message here" />
        <button type="button" onclick="postMessage()">Post</button>
    </form>
    <ul id="messageList"></ul>

    <script>
        function postMessage() {
            var messageInput = document.getElementById("message");
            var message = messageInput.value;
            var messageList = document.getElementById("messageList");
            var listItem = document.createElement("li");
            listItem.innerHTML = message;
            messageList.appendChild(listItem);
            saveMessage(message);
            messageInput.value = "";
        }

        function saveMessage(message) {
            var request = new XMLHttpRequest();
            request.open("POST", "https://api.github.com/repos/rutra8002/rutra8002.github.io/contents/messages.txt", true);
            request.setRequestHeader("Authorization", "Bearer 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");
            request.setRequestHeader("Content-Type", "application/json;charset=UTF-8");
            request.onload = function() {
                console.log("Message saved to file");
            };
            var messageObject = {
                "message": message
            };
            var messageJSON = JSON.stringify(messageObject);
            var contentObject = {
                "message.txt": {
                    "content": btoa(messageJSON)
                }
            };
            var content = JSON.stringify(contentObject);
            request.send(content);
        }
    </script>
</body>
</html>
